<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>nikibox Host</title><link rel="stylesheet" href="style.css?v=2">
</head><body data-role="host">
<main>
  <h1>nikibox</h1>
  <section id="lobby" class="panel">
    <p>Room Code</p><div><b id="code">----</b> <button id="newRoomBtn" style="padding: 4px 10px; font-size: 0.9rem;">New Room</button></div>
    <div id="qr"></div><p id="joinUrl"></p>
    <h2>Players</h2><ul id="players"></ul>
    <div id="games" hidden><h2>Choose a game</h2><button id="start">Telesketch</button><button id="ringo">Ringo</button></div>
  </section>
  <section id="play" class="panel" hidden>
    <h2 id="phase">Waiting...</h2><p id="count"></p><div id="hostBoard"></div>
  </section>
  <section id="reveal" class="panel" hidden>
    <h2 id="revTitle">Reveal</h2><div id="revBody"></div>
    <p id="revStep"></p><button id="prev">Back</button><button id="next">Next</button><button id="restart">Back to nikibox</button>
  </section>
</main>
<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="game.js?v=2"></script>
</body></html>
