<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Telesketch Player</title><link rel="stylesheet" href="style.css">
</head><body data-role="player">
<main>
  <h1>Telesketch</h1>
  <section id="join" class="panel">
    <input id="room" maxlength="4" placeholder="ROOM" autocomplete="off">
    <input id="name" maxlength="18" placeholder="Your name" autocomplete="name">
    <button id="joinBtn">Join</button><p id="err"></p>
  </section>
  <section id="wait" class="panel" hidden><h2 id="waitMsg">Waiting for host to start...</h2></section>
  <section id="task" class="panel" hidden>
    <h2 id="taskTitle"></h2><div id="taskBody"></div><button id="submit">Submit</button>
  </section>
</main>
<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
<script src="game.js"></script>
</body></html>
